#
# ODP Maven Cache Warmer
#
# Warms the m2-zookeeper-* cache on every merge to a nightly release branch
# so that all PR builds get a cache hit on their first run.
#
# PRs are always raised against nightly/* branches, never ODP-main,
# so only nightly/** push triggers are needed.
#
# Secrets required (same as odp-ci.yaml):
#   ODP_MAVEN_SETTINGS — Maven settings.xml content (Nexus credentials)

name: ODP Cache Warmer

on:
  push:
    branches: ['nightly/**']

permissions: {}

jobs:
  warm-cache:
    name: Warm Maven cache — ODP-main
    runs-on: ubuntu-latest
    container:
      image: repo1.acceldata.dev:8086/odp-images/build-env/rockylinux8.8-jdk11-py3:1
      options: --user root
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Set up Maven settings
        run: |
          mkdir -p /root/.m2
          echo "$MAVEN_SETTINGS" > /root/.m2/settings.xml
        env:
          MAVEN_SETTINGS: ${{ secrets.ODP_MAVEN_SETTINGS }}

      - name: Restore Maven cache
        uses: actions/cache@v4
        with:
          path: |
            /root/.m2/repository
            !/root/.m2/repository/org/apache/zookeeper
          key: m2-zookeeper-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            m2-zookeeper-

      - name: Download all dependencies
        run: mvn -B -Pfull-build dependency:go-offline -q
